<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DnDice — Dice Roller</title>
  <style>
    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --bg:        #0e0e14;
      --surface:   #1a1a26;
      --raised:    #22223a;
      --border:    #2e2e4a;
      --accent:    #c8a84b;
      --accent2:   #9b59b6;
      --text:      #e8e4d9;
      --muted:     #8a8aaa;
      --red:       #e74c3c;
      --green:     #2ecc71;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.6);
    }

    /* ── Reset / Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: .08em;
      background: linear-gradient(135deg, var(--accent), #f0d080, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      font-size: .85rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Main card ──────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 560px;
      padding: 28px 24px;
    }

    /* ── Dice grid ──────────────────────────────────────── */
    .dice-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .die-btn {
      background: var(--raised);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      padding: 12px 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color .15s, transform .1s, background .15s;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .die-btn:hover   { border-color: var(--accent); background: #2a2a42; }
    .die-btn.active  { border-color: var(--accent); background: #2a2a3e; }
    .die-btn:active  { transform: scale(.94); }

    .die-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .die-icon svg { width: 100%; height: 100%; }

    .die-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .die-btn.active .die-label { color: var(--accent); }

    /* count badge */
    .die-count {
      position: absolute;
      top: 6px; right: 6px;
      background: var(--accent);
      color: #111;
      font-size: .65rem;
      font-weight: 800;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      opacity: 0;
      transform: scale(.6);
      transition: opacity .15s, transform .15s;
    }
    .die-btn.active .die-count {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Controls row ───────────────────────────────────── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    .modifier-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
    }
    .mod-label {
      padding: 0 10px;
      font-size: .75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .mod-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      width: 60px;
      text-align: center;
      padding: 10px 4px;
      outline: none;
      -moz-appearance: textfield;
    }
    .mod-input::-webkit-inner-spin-button,
    .mod-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .advantage-wrap {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .adv-btn {
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 10px;
      transition: all .15s;
      line-height: 1.2;
      text-align: center;
    }
    .adv-btn:hover { border-color: var(--muted); color: var(--text); }
    .adv-btn.adv-active   { background: #1a3a1a; border-color: var(--green); color: var(--green); }
    .adv-btn.disadv-active { background: #3a1a1a; border-color: var(--red);   color: var(--red);   }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: .75rem;
      cursor: pointer;
      padding: 8px 12px;
      transition: all .15s;
      white-space: nowrap;
      margin-left: auto;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Roll button ────────────────────────────────────── */
    .roll-btn {
      width: 100%;
      background: linear-gradient(135deg, #b8942a, var(--accent), #d4b050);
      border: none;
      border-radius: var(--radius);
      color: #111;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: filter .15s, transform .1s;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .roll-btn:hover { filter: brightness(1.1); }
    .roll-btn:active { transform: scale(.98); filter: brightness(.95); }
    .roll-btn:disabled { filter: brightness(.4); cursor: not-allowed; transform: none; }

    /* shimmer */
    .roll-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
      transform: translateX(-100%);
    }
    .roll-btn.rolling::after {
      animation: shimmer .6s ease-in-out;
    }
    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    /* ── Result panel ───────────────────────────────────── */
    .result-panel {
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .result-empty {
      color: var(--muted);
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .result-expression {
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .05em;
    }

    .result-dice-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .result-die-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: .85rem;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      animation: popIn .2s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .result-die-chip.is-max { border-color: var(--accent); color: var(--accent); }
    .result-die-chip.is-min { border-color: #555; color: var(--muted); }
    .result-die-chip span.die-type { font-size: .6rem; color: var(--muted); text-transform: uppercase; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.5) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0);    }
    }

    .result-total {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #f0d080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: popIn .3s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .result-total.crit {
      background: linear-gradient(135deg, #f0d080, #fff, #f0d080);
      -webkit-background-clip: text;
      background-clip: text;
      animation: popIn .3s cubic-bezier(.175,.885,.32,1.275) both, glow 1s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 6px #f0d080); }
      to   { filter: drop-shadow(0 0 18px #fff); }
    }

    .result-modifier {
      font-size: .85rem;
      color: var(--muted);
    }

    .crit-label {
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,168,75,.12);
      border: 1px solid rgba(200,168,75,.3);
      border-radius: 4px;
      padding: 2px 8px;
      animation: popIn .4s .2s both;
    }

    /* rolling dice animation */
    .rolling-anim {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .rolling-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce .5s infinite alternate;
    }
    .rolling-dot:nth-child(2) { animation-delay: .15s; }
    .rolling-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      to { transform: translateY(-8px); opacity: .4; }
    }

    /* ── History ────────────────────────────────────────── */
    .history-section { width: 100%; max-width: 560px; margin-top: 16px; }
    .history-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .82rem;
      animation: slideIn .2s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .history-item .h-expr { color: var(--muted); }
    .history-item .h-total { font-weight: 800; font-size: 1rem; color: var(--accent); }
    .history-item .h-time { font-size: .7rem; color: var(--border); }

    /* ── Responsive tweaks ──────────────────────────────── */
    @media (max-width: 400px) {
      .dice-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .die-icon  { width: 36px; height: 36px; }
      .controls  { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <h1>DnDice</h1>
  <p>Roll the bones</p>
</header>

<div class="card">

  <!-- Dice selector grid -->
  <div class="dice-grid" id="diceGrid"></div>

  <!-- Controls: modifier + advantage + clear -->
  <div class="controls">
    <div class="modifier-wrap">
      <span class="mod-label">Mod</span>
      <input class="mod-input" type="number" id="modifier" value="0" min="-99" max="99" />
    </div>
    <div class="advantage-wrap">
      <button class="adv-btn" id="advBtn"   onclick="toggleAdv('adv')">ADV</button>
      <button class="adv-btn" id="disadvBtn" onclick="toggleAdv('disadv')">DIS</button>
    </div>
    <button class="clear-btn" onclick="clearAll()">Clear</button>
  </div>

  <!-- Roll -->
  <button class="roll-btn" id="rollBtn" onclick="rollDice()">Roll</button>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <span class="result-empty">Select dice and roll</span>
  </div>

</div>

<!-- History -->
<section class="history-section" id="historySection" style="display:none">
  <div class="history-title">Recent Rolls</div>
  <div class="history-list" id="historyList"></div>
</section>

<script>
// ── State ────────────────────────────────────────────────
const DICE = [
  { sides: 4,   label: 'd4',   color: '#e74c3c' },
  { sides: 6,   label: 'd6',   color: '#e67e22' },
  { sides: 8,   label: 'd8',   color: '#f1c40f' },
  { sides: 10,  label: 'd10',  color: '#2ecc71' },
  { sides: 12,  label: 'd12',  color: '#3498db' },
  { sides: 20,  label: 'd20',  color: '#9b59b6' },
  { sides: 100, label: 'd100', color: '#e91e63' },
];

let counts = {};        // { 4: 2, 20: 1, … }
let advantage = null;   // 'adv' | 'disadv' | null
let history = [];
let rolling = false;

DICE.forEach(d => counts[d.sides] = 0);

// ── Build dice buttons ───────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('diceGrid');
  DICE.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'die-btn';
    btn.id = `die-${d.sides}`;
    btn.setAttribute('aria-label', `Add ${d.label}`);
    btn.innerHTML = `
      <div class="die-icon">${diceSVG(d.sides, d.color)}</div>
      <span class="die-label">${d.label}</span>
      <span class="die-count" id="cnt-${d.sides}">1</span>
    `;
    btn.addEventListener('click', () => addDie(d.sides));
    btn.addEventListener('contextmenu', e => { e.preventDefault(); removeDie(d.sides); });
    grid.appendChild(btn);
  });
}

// ── Dice SVG shapes ──────────────────────────────────────
function diceSVG(sides, color) {
  const c = color;
  const shapes = {
    4:   `<svg viewBox="0 0 48 48" fill="none">
            <polygon points="24,4 44,42 4,42" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/>
            <line x1="24" y1="4" x2="24" y2="42" stroke="${c}" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/>
            <text x="24" y="32" text-anchor="middle" fill="${c}" font-size="11" font-weight="800" font-family="sans-serif">4</text>
          </svg>`,
    6:   `<svg viewBox="0 0 48 48" fill="none">
            <rect x="6" y="6" width="36" height="36" rx="6" stroke="${c}" stroke-width="2.5"/>
            <text x="24" y="30" text-anchor="middle" fill="${c}" font-size="14" font-weight="800" font-family="sans-serif">6</text>
          </svg>`,
    8:   `<svg viewBox="0 0 48 48" fill="none">
            <polygon points="24,3 44,24 24,45 4,24" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/>
            <line x1="4" y1="24" x2="44" y2="24" stroke="${c}" stroke-width="1" opacity=".4"/>
            <text x="24" y="29" text-anchor="middle" fill="${c}" font-size="12" font-weight="800" font-family="sans-serif">8</text>
          </svg>`,
    10:  `<svg viewBox="0 0 48 48" fill="none">
            <polygon points="24,4 42,18 36,40 12,40 6,18" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/>
            <text x="24" y="30" text-anchor="middle" fill="${c}" font-size="11" font-weight="800" font-family="sans-serif">10</text>
          </svg>`,
    12:  `<svg viewBox="0 0 48 48" fill="none">
            <polygon points="24,3 38,8 46,21 42,36 28,45 20,45 6,36 2,21 10,8" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/>
            <text x="24" y="30" text-anchor="middle" fill="${c}" font-size="11" font-weight="800" font-family="sans-serif">12</text>
          </svg>`,
    20:  `<svg viewBox="0 0 48 48" fill="none">
            <polygon points="24,2 46,14 46,34 24,46 2,34 2,14" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/>
            <line x1="2" y1="14" x2="46" y2="14" stroke="${c}" stroke-width="1" opacity=".4"/>
            <line x1="2" y1="34" x2="46" y2="34" stroke="${c}" stroke-width="1" opacity=".4"/>
            <text x="24" y="30" text-anchor="middle" fill="${c}" font-size="11" font-weight="800" font-family="sans-serif">20</text>
          </svg>`,
    100: `<svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="${c}" stroke-width="2.5"/>
            <circle cx="24" cy="24" r="12" stroke="${c}" stroke-width="1" opacity=".4"/>
            <text x="24" y="28" text-anchor="middle" fill="${c}" font-size="9" font-weight="800" font-family="sans-serif">100</text>
          </svg>`,
  };
  return shapes[sides] || '';
}

// ── Die interactions ─────────────────────────────────────
function addDie(sides) {
  counts[sides]++;
  updateDieBtn(sides);
}

function removeDie(sides) {
  if (counts[sides] > 0) {
    counts[sides]--;
    updateDieBtn(sides);
  }
}

function updateDieBtn(sides) {
  const btn = document.getElementById(`die-${sides}`);
  const cnt = document.getElementById(`cnt-${sides}`);
  cnt.textContent = counts[sides];
  btn.classList.toggle('active', counts[sides] > 0);
}

function clearAll() {
  DICE.forEach(d => { counts[d.sides] = 0; updateDieBtn(d.sides); });
  advantage = null;
  document.getElementById('advBtn').className = 'adv-btn';
  document.getElementById('disadvBtn').className = 'adv-btn';
  document.getElementById('modifier').value = 0;
  showEmpty();
}

// ── Advantage toggle ─────────────────────────────────────
function toggleAdv(mode) {
  advantage = (advantage === mode) ? null : mode;
  document.getElementById('advBtn').className    = 'adv-btn' + (advantage === 'adv'    ? ' adv-active'    : '');
  document.getElementById('disadvBtn').className = 'adv-btn' + (advantage === 'disadv' ? ' disadv-active' : '');
}

// ── Roll logic ───────────────────────────────────────────
function rand(sides) { return Math.floor(Math.random() * sides) + 1; }

function rollDice() {
  if (rolling) return;

  const hasDice = DICE.some(d => counts[d.sides] > 0);
  if (!hasDice) {
    shakePanel();
    return;
  }

  rolling = true;
  const btn = document.getElementById('rollBtn');
  btn.classList.add('rolling');
  btn.disabled = true;

  showRolling();

  setTimeout(() => {
    doRoll();
    btn.classList.remove('rolling');
    btn.disabled = false;
    rolling = false;
  }, 600);
}

function doRoll() {
  const modifier = parseInt(document.getElementById('modifier').value, 10) || 0;
  const results = [];
  let expr = '';

  DICE.forEach(d => {
    if (counts[d.sides] === 0) return;
    const rolls = [];

    if ((advantage === 'adv' || advantage === 'disadv') && d.sides === 20 && counts[d.sides] === 1) {
      // roll 2d20, keep best/worst
      const a = rand(20), b = rand(20);
      const kept = advantage === 'adv' ? Math.max(a, b) : Math.min(a, b);
      rolls.push({ value: kept, dropped: [a, b].filter(v => v !== kept) });
    } else {
      for (let i = 0; i < counts[d.sides]; i++) rolls.push({ value: rand(d.sides), dropped: [] });
    }

    rolls.forEach(r => results.push({ sides: d.sides, label: d.label, ...r }));
    expr += (expr ? '+' : '') + (counts[d.sides] > 1 ? counts[d.sides] : '') + d.label;
  });

  const rawSum = results.reduce((s, r) => s + r.value, 0);
  const total = rawSum + modifier;

  // Crit check (at least one natural 20)
  const isCrit = results.some(r => r.sides === 20 && r.value === 20);
  const isCritFail = results.some(r => r.sides === 20 && r.value === 1) && !isCrit;

  // build expression string
  if (modifier !== 0) expr += (modifier > 0 ? '+' : '') + modifier;
  if (advantage === 'adv')    expr = expr + ' (Adv)';
  if (advantage === 'disadv') expr = expr + ' (Dis)';

  showResult(results, total, rawSum, modifier, expr, isCrit, isCritFail);
  addHistory(expr, total);
}

// ── UI helpers ───────────────────────────────────────────
function showEmpty() {
  document.getElementById('resultPanel').innerHTML =
    `<span class="result-empty">Select dice and roll</span>`;
}

function showRolling() {
  document.getElementById('resultPanel').innerHTML =
    `<div class="rolling-anim"><div class="rolling-dot"></div><div class="rolling-dot"></div><div class="rolling-dot"></div></div>`;
}

function showResult(results, total, rawSum, modifier, expr, isCrit, isCritFail) {
  const panel = document.getElementById('resultPanel');
  const maxMap = {};
  results.forEach(r => { maxMap[r.sides] = r.sides; }); // max possible = sides

  const chips = results.map((r, i) => {
    let cls = 'result-die-chip';
    if (r.value === r.sides) cls += ' is-max';
    if (r.value === 1) cls += ' is-min';
    return `<div class="${cls}" style="animation-delay:${i * 0.05}s">
              <span>${r.value}</span>
              <span class="die-type">${r.label}</span>
            </div>`;
  }).join('');

  let modText = '';
  if (modifier !== 0) modText = `<div class="result-modifier">${rawSum} ${modifier >= 0 ? '+' : '−'} ${Math.abs(modifier)} mod</div>`;

  let badge = '';
  if (isCrit)     badge = `<div class="crit-label">Natural 20 ✦</div>`;
  if (isCritFail) badge = `<div class="crit-label" style="color:var(--red);border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.08)">Critical Fail</div>`;

  panel.innerHTML = `
    <div class="result-expression">${expr}</div>
    <div class="result-dice-list">${chips}</div>
    ${modText}
    <div class="result-total ${isCrit ? 'crit' : ''}">${total}</div>
    ${badge}
  `;
}

function shakePanel() {
  const panel = document.getElementById('resultPanel');
  panel.style.animation = 'none';
  panel.offsetHeight; // reflow
  panel.style.animation = 'shake .4s ease';
}

function addHistory(expr, total) {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  history.unshift({ expr, total, time });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="h-expr">${h.expr}</span>
      <span class="h-total">${h.total}</span>
      <span class="h-time">${h.time}</span>
    </div>`).join('');
}

// ── Init ─────────────────────────────────────────────────
buildGrid();

// keyboard shortcut: Space / Enter to roll
document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'BUTTON') {
    e.preventDefault();
    rollDice();
  }
});

// Add shake keyframe dynamically
const style = document.createElement('style');
style.textContent = `@keyframes shake {
  0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
}`;
document.head.appendChild(style);
</script>
</body>
